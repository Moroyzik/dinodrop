version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      ENV: development
      PROVIDERS_MODE: mock
      SECRET_KEY: "mock_secret_key"
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
      STEAM_API_KEY: "mock_steam_key"
      STEAM_OPENID_RETURN: "http://localhost/auth/steam/callback"
      YOOKASSA_SHOP_ID: "mock_shop_id"
      YOOKASSA_SECRET: "mock_secret"
      YOOKASSA_PAYOUT_KEY: "mock_payout"
      USDT_PROVIDER_KEY: "mock_usdt_key"
      USDT_TRON_WALLET: "TR_mock_wallet"
      USDT_ETH_WALLET: "0xmockwallet"
      SMTP_HOST: "mock_smtp"
      SMTP_USER: "mock_user"
      SMTP_PASS: "mock_pass"
      SENTRY_DSN: "mock_sentry"
    depends_on:
      - postgres
      - redis
    ports: ["8080:8080"]

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8080"
    depends_on:
      - api
    ports: ["3000:3000"]

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    ports: ["80:80"]

volumes:
  pgdata:

